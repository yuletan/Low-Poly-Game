<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Low-Poly RTS</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Three.js via importmap (no build tools needed) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ===== Difficulty / Start Menu ===== -->
  <div id="startMenu" class="overlay center">
    <div class="panel">
      <h1>⚔️ LOW-POLY COMMAND ⚔️</h1>
      <p>Select Difficulty</p>
      <div class="row">
        <button data-diff="easy"   class="btn btn-green">EASY</button>
        <button data-diff="normal" class="btn btn-amber">NORMAL</button>
        <button data-diff="hard"   class="btn btn-red">HARD</button>
      </div>
    </div>
  </div>

  <!-- ===== HUD: Money + Selection Info ===== -->
  <div id="hud" class="overlay hidden">

    <!-- Top bar -->
    <div id="topBar" class="bar">
      <span>💰 <span id="money">500</span> <span id="income" style="color:#4f4;font-size:11px;">(+10/s)</span></span>
      <span>🏰 Bases: <span id="basesOwned">1</span> / <span id="basesTotal">6</span></span>
      <span>👥 Units: <span id="unitCount">0</span></span>
      <span>⚠️ Enemy: <span id="enemyCount" style="color:#f44;">?</span></span>
      <span id="difficulty">Difficulty: —</span>
    </div>

    <!-- Bottom-left: Combined Selection + Formation Panel -->
    <div id="selectionPanel" class="panel small">
      <div class="panel-header">
        <h3>Selection</h3>
        <button id="selectAllBtn" class="mini-btn" title="Select all units (Ctrl+A)">⬜ All</button>
      </div>
      <div id="selectionInfo">No units selected</div>
      
      <div class="formation-section" style="margin-top: 12px; padding-top: 10px; border-top: 1px solid #334;">
        <label for="formationSelect" style="font-size: 11px; color: #888; margin-bottom: 4px; display: block;">Formation</label>
        <div class="formation-options" style="display: flex; gap: 4px; flex-wrap: wrap;">
          <button type="button" class="formation-btn active" data-formation="line" title="Line (F1)">
            <span class="formation-icon">━━━</span>
          </button>
          <button type="button" class="formation-btn" data-formation="wedge" title="Wedge (F2)">
            <span class="formation-icon">▲</span>
          </button>
          <button type="button" class="formation-btn" data-formation="square" title="Square (F3)">
            <span class="formation-icon">■</span>
          </button>
          <button type="button" class="formation-btn" data-formation="column" title="Column (F4)">
            <span class="formation-icon">┃</span>
          </button>
        </div>
        <select id="formationSelect" style="display: none;">
          <option value="line">Line</option>
          <option value="wedge">Wedge</option>
          <option value="square">Square</option>
          <option value="column">Column</option>
        </select>
      </div>
    </div>

    <!-- Bottom-right: Build / Armory menu -->
    <div id="buildPanel" class="panel small">
      <h3>Armory</h3>
      <div id="buildButtons"></div>
    </div>

    <!-- Selection box (drawn during drag) -->
    <div id="selectionBox"></div>

    <!-- Placement mode indicator -->
    <div id="placementIndicator" class="hidden"></div>
  </div>

  <!-- ===== End screen ===== -->
  <div id="endScreen" class="overlay center hidden">
    <div class="panel">
      <h1 id="endTitle">Victory!</h1>
      <button id="restartBtn" class="btn btn-green">Play Again</button>
    </div>
  </div>

  <!-- Three.js canvas mounts here -->
  <div id="gameCanvas"></div>

  <script>
    window.addEventListener('error', (e) => {
      const div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:99999;font-family:monospace;font-size:14px;white-space:pre-wrap;';
      div.textContent = 'JS ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno;
      document.body.appendChild(div);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:40px;left:0;right:0;background:orange;color:black;padding:10px;z-index:99999;font-family:monospace;font-size:14px;white-space:pre-wrap;';
      div.textContent = 'PROMISE ERROR: ' + e.reason;
      document.body.appendChild(div);
    });
  </script>
  <script type="module" src="js/main.js?v=7"></script>
</body>
</html>
